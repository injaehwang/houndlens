# houndlens GitLab CI template
# Usage: include this file in your .gitlab-ci.yml
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/injaehwang/houndlens/main/ci/gitlab-ci.yml'
#
# Or copy this file into your project.

houndlens:verify:
  stage: test
  image: rust:latest
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
  cache:
    key: houndlens-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - target/
  before_script:
    - cargo install houndlens 2>/dev/null || cargo install --git https://github.com/injaehwang/houndlens
  script:
    - houndlens ci --platform gitlab --fail-on error
    - houndlens --format json ci --platform gitlab > houndlens-report.json
    - houndlens --format sarif ci --platform gitlab > houndlens-results.sarif || true
  artifacts:
    paths:
      - houndlens-report.json
      - houndlens-results.sarif
      - houndlens.env
    reports:
      dotenv: houndlens.env
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Optional: post MR comment with results
houndlens:comment:
  stage: deploy
  needs: ["houndlens:verify"]
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" != "merge_request_event" ]; then
        echo "Not a merge request, skipping comment."
        exit 0
      fi

      REPORT="houndlens-report.json"
      if [ ! -f "$REPORT" ]; then
        echo "No report found, skipping."
        exit 0
      fi

      STATUS=$(jq -r '.status' "$REPORT")
      RISK=$(jq -r '.risk_score * 100 | floor' "$REPORT")
      CHANGES=$(jq -r '.summary.total_changes' "$REPORT")
      BREAKING=$(jq -r '.summary.breaking' "$REPORT")
      WARNINGS=$(jq -r '.summary.warnings' "$REPORT")

      if [ "$STATUS" = "pass" ]; then
        ICON="✅"
      else
        ICON="❌"
      fi

      BODY="## ${ICON} houndlens verification\n\n"
      BODY="${BODY}| Metric | Value |\n|--------|-------|\n"
      BODY="${BODY}| Status | **$(echo $STATUS | tr '[:lower:]' '[:upper:]')** |\n"
      BODY="${BODY}| Risk | **${RISK}%** |\n"
      BODY="${BODY}| Changes | ${CHANGES} |\n"
      BODY="${BODY}| Breaking | ${BREAKING} |\n"
      BODY="${BODY}| Warnings | ${WARNINGS} |\n\n"

      # Add semantic changes
      BODY="${BODY}### Changes\n\n"
      BODY="${BODY}$(jq -r '.semantic_changes[:10][] | "- **\(.kind)** \(.file | split("/") | last):\(.line) — \(.description)"' "$REPORT")\n\n"
      BODY="${BODY}---\n🔍 *Generated by [houndlens](https://github.com/injaehwang/houndlens)*"

      # Post comment via GitLab API
      curl --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n --arg body "$BODY" '{body: $body}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true
